<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cielo-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9ef"/>
      <stop offset="0.55" stop-color="#ffd3d9"/>
      <stop offset="1" stop-color="#ffc0a8"/>
    </linearGradient>
    <linearGradient id="tallo-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fa06a"/>
      <stop offset="1" stop-color="#3f7d4c"/>
    </linearGradient>
    <linearGradient id="petalo-rosa" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8fae"/>
      <stop offset="1" stop-color="#f0628a"/>
    </linearGradient>
    <linearGradient id="petalo-coral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffab8a"/>
      <stop offset="1" stop-color="#ff7a5c"/>
    </linearGradient>
    <linearGradient id="petalo-rojo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7a94"/>
      <stop offset="1" stop-color="#e0435f"/>
    </linearGradient>

    <!-- Un tulipán: flor (copa de 3 pétalos) + tallo + hoja -->
    <g id="tulipan">
      <path d="M0,300 C -10,180 8,120 0,60" fill="none" stroke="url(#tallo-t)" stroke-width="6" stroke-linecap="round"/>
      <path d="M-40,180 C -95,120 -70,60 -14,110 C -34,150 -30,170 -40,180 Z" fill="url(#tallo-t)" opacity="0.9"/>
      <g>
        <path d="M-26,60 C -30,4 -6,-6 0,44 C -8,54 -18,58 -26,60 Z" fill="var(--pf, url(#petalo-rosa))"/>
        <path d="M26,60 C 30,4 6,-6 0,44 C 8,54 18,58 26,60 Z" fill="var(--pf, url(#petalo-rosa))"/>
        <path d="M0,64 C -22,58 -24,10 0,-2 C 24,10 22,58 0,64 Z" fill="var(--pf, url(#petalo-rosa))"/>
      </g>
    </g>
  </defs>

  <rect width="1200" height="800" fill="url(#cielo-t)"/>

  <g opacity="0.94">
    <use href="#tulipan" transform="translate(130,470) scale(1.15) rotate(-4)" style="--pf:url(#petalo-rosa)"/>
    <use href="#tulipan" transform="translate(300,500) scale(1.0) rotate(4)" style="--pf:url(#petalo-coral)"/>
    <use href="#tulipan" transform="translate(470,460) scale(1.25) rotate(-3)" style="--pf:url(#petalo-rojo)"/>
    <use href="#tulipan" transform="translate(640,505) scale(1.0) rotate(5)" style="--pf:url(#petalo-rosa)"/>
    <use href="#tulipan" transform="translate(800,465) scale(1.2) rotate(-4)" style="--pf:url(#petalo-coral)"/>
    <use href="#tulipan" transform="translate(970,500) scale(1.05) rotate(4)" style="--pf:url(#petalo-rojo)"/>
    <use href="#tulipan" transform="translate(1110,470) scale(1.15) rotate(-5)" style="--pf:url(#petalo-rosa)"/>
  </g>
</svg>
