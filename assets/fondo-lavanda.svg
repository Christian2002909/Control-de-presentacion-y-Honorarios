<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cielo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efeaff"/>
      <stop offset="0.55" stop-color="#e2d6f7"/>
      <stop offset="1" stop-color="#cdb8f0"/>
    </linearGradient>
    <linearGradient id="tallo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c9a5b"/>
      <stop offset="1" stop-color="#5c7d43"/>
    </linearGradient>
    <linearGradient id="flor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b39ddb"/>
      <stop offset="1" stop-color="#7e57c2"/>
    </linearGradient>
    <g id="espiga">
      <path d="M0,260 C -6,170 6,90 0,0" fill="none" stroke="url(#tallo)" stroke-width="5" stroke-linecap="round"/>
      <g fill="url(#flor)">
        <ellipse cx="0" cy="8" rx="9" ry="15"/>
        <ellipse cx="-9" cy="34" rx="8" ry="13"/>
        <ellipse cx="9" cy="34" rx="8" ry="13"/>
        <ellipse cx="-10" cy="62" rx="8" ry="13"/>
        <ellipse cx="10" cy="62" rx="8" ry="13"/>
        <ellipse cx="-9" cy="90" rx="7" ry="12"/>
        <ellipse cx="9" cy="90" rx="7" ry="12"/>
        <ellipse cx="-7" cy="116" rx="6" ry="11"/>
        <ellipse cx="7" cy="116" rx="6" ry="11"/>
        <ellipse cx="0" cy="140" rx="6" ry="10"/>
      </g>
    </g>
  </defs>

  <rect width="1200" height="800" fill="url(#cielo)"/>

  <!-- Espigas de lavanda repartidas -->
  <g opacity="0.92">
    <use href="#espiga" transform="translate(120,520) scale(1.15) rotate(-6)"/>
    <use href="#espiga" transform="translate(230,560) scale(1.0) rotate(5)"/>
    <use href="#espiga" transform="translate(340,510) scale(1.25) rotate(-3)"/>
    <use href="#espiga" transform="translate(470,570) scale(0.95) rotate(7)"/>
    <use href="#espiga" transform="translate(600,520) scale(1.2) rotate(-5)"/>
    <use href="#espiga" transform="translate(720,565) scale(1.0) rotate(4)"/>
    <use href="#espiga" transform="translate(840,515) scale(1.22) rotate(-4)"/>
    <use href="#espiga" transform="translate(960,560) scale(0.98) rotate(6)"/>
    <use href="#espiga" transform="translate(1080,525) scale(1.18) rotate(-6)"/>
    <use href="#espiga" transform="translate(1160,575) scale(0.9) rotate(3)"/>
  </g>
</svg>
